<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COM-DSS | ITU Ayazağa Campus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0c0a09; color: #f5f5f4; }
        .itu-gradient { background: linear-gradient(135deg, #1a2e1a 0%, #2d1a1a 100%); }
        .status-quiet { @apply bg-green-500/20 text-green-400 border-green-500/30; }
        .status-moderate { @apply bg-orange-500/20 text-orange-400 border-orange-500/30; }
        .status-crowded { @apply bg-red-500/20 text-red-400 border-red-500/30; }
        .glass-panel { @apply bg-white/5 backdrop-blur-md border border-white/10 rounded-xl; }
    </style>
</head>
<body class="antialiased overflow-hidden">

    <!-- ROLE SWITCHER (FOR TESTING) -->
    <div class="fixed bottom-6 right-6 z-50 flex space-x-2 bg-stone-900 p-2 rounded-full border border-stone-700 shadow-2xl">
        <button onclick="setRole('student')" id="btn-student" class="px-4 py-2 rounded-full text-xs font-bold transition-all bg-stone-700 text-white">STUDENT VIEW</button>
        <button onclick="setRole('admin')" id="btn-admin" class="px-4 py-2 rounded-full text-xs font-bold transition-all text-stone-400 hover:text-white">ADMIN PORTAL</button>
    </div>

    <div class="flex h-screen">
        <!-- SIDEBAR -->
        <aside class="w-64 border-r border-stone-800 flex flex-col bg-stone-950/50">
            <div class="p-6">
                <div class="flex items-center space-x-3 mb-8">
                    <div class="w-10 h-10 bg-emerald-700 rounded-lg flex items-center justify-center font-bold text-xl shadow-lg shadow-emerald-900/20">C</div>
                    <div>
                        <h1 class="font-bold text-lg tracking-tight">COM-DSS</h1>
                        <p class="text-[10px] text-stone-500 uppercase tracking-widest leading-none">ITU Ayazağa Campus</p>
                    </div>
                </div>

                <nav class="space-y-1" id="main-nav">
                    <!-- Nav items injected by JS -->
                </nav>
            </div>

            <div class="mt-auto p-6 border-t border-stone-800">
                <div id="user-context" class="flex items-center space-x-3">
                    <div class="w-8 h-8 rounded-full bg-stone-800 flex items-center justify-center text-stone-400">
                        <i data-lucide="user"></i>
                    </div>
                    <div class="text-xs">
                        <p id="user-label" class="font-medium text-stone-300">Anonymous User</p>
                        <p class="text-stone-500">ITU-Net Connected</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="flex-1 flex flex-col overflow-hidden">
            <!-- TOP BAR -->
            <header class="h-16 border-b border-stone-800 flex items-center justify-between px-8 bg-stone-950/20">
                <div class="flex items-center flex-1 max-w-xl">
                    <div class="relative w-full">
                        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-stone-500"></i>
                        <input type="text" id="global-search" placeholder="Search facilities, study rooms..." 
                               class="w-full bg-stone-900 border border-stone-800 rounded-lg py-2 pl-10 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/50 transition-all">
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="flex items-center space-x-2 text-xs text-stone-400">
                        <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                        <span>LIVE SYSTEM STATUS</span>
                    </div>
                </div>
            </header>

            <!-- VIEWPORT -->
            <div id="viewport" class="flex-1 overflow-y-auto p-8 bg-[#0c0a09]">
                <!-- Content injected here -->
            </div>
        </main>
    </div>

    <!-- MODAL / DRAWER FOR FACILITY DETAILS -->
    <div id="details-modal" class="hidden fixed inset-0 z-[60] flex items-center justify-end bg-black/60 backdrop-blur-sm">
        <div class="w-full max-w-md h-full bg-stone-900 border-l border-stone-700 shadow-2xl p-8 overflow-y-auto transform transition-transform duration-300 translate-x-0">
             <!-- Details content injected by JS -->
        </div>
    </div>

    <script>
        // --- MOCK DATA (SIMULATING SUPABASE) ---
        const facilities = [
            { id: 1, name: "Mustafa İnan Library", category: "Studying", capacity: 850, current_count: 790, status: "Crowded", hours: "24/7", coords: { x: 45, y: 30 } },
            { id: 2, name: "Central Dining Hall", category: "Eating", capacity: 1200, current_count: 450, status: "Moderate", hours: "11:30 - 14:30", coords: { x: 55, y: 50 } },
            { id: 3, name: "Faculty of Management Lounge", category: "Quiet Zone", capacity: 80, current_count: 15, status: "Quiet", hours: "08:30 - 18:00", coords: { x: 20, y: 60 } },
            { id: 4, name: "MED B Building", category: "Studying", capacity: 200, current_count: 185, status: "Crowded", hours: "08:30 - 22:00", coords: { x: 40, y: 45 } },
            { id: 5, name: "Vadi Cafeteria", category: "Eating", capacity: 300, current_count: 40, status: "Quiet", hours: "08:00 - 23:00", coords: { x: 70, y: 20 } },
            { id: 6, name: "SDKM Common Area", category: "Group Work", capacity: 150, current_count: 65, status: "Moderate", hours: "08:30 - 21:00", coords: { x: 30, y: 15 } }
        ];

        let currentRole = 'student';
        let activePage = 'map';

        // --- STATE ENGINE ---
        function setRole(role) {
            currentRole = role;
            document.getElementById('btn-student').className = role === 'student' ? 'px-4 py-2 rounded-full text-xs font-bold transition-all bg-stone-700 text-white' : 'px-4 py-2 rounded-full text-xs font-bold transition-all text-stone-400 hover:text-white';
            document.getElementById('btn-admin').className = role === 'admin' ? 'px-4 py-2 rounded-full text-xs font-bold transition-all bg-stone-700 text-white' : 'px-4 py-2 rounded-full text-xs font-bold transition-all text-stone-400 hover:text-white';
            
            document.getElementById('user-label').innerText = role === 'admin' ? 'Admin: Facility Mgr.' : 'Anonymous User';
            activePage = role === 'admin' ? 'admin-dashboard' : 'map';
            renderNav();
            renderView();
        }

        function renderNav() {
            const nav = document.getElementById('main-nav');
            const items = currentRole === 'student' ? [
                { id: 'map', icon: 'map', label: 'Live Campus Map' },
                { id: 'list', icon: 'list', label: 'Browse Facilities' },
                { id: 'trends', icon: 'bar-chart-2', label: 'Historical Trends' }
            ] : [
                { id: 'admin-dashboard', icon: 'layout-dashboard', label: 'Overview' },
                { id: 'admin-analytics', icon: 'pie-chart', label: 'Structural Analytics' },
                { id: 'admin-settings', icon: 'settings', label: 'System Config' }
            ];

            nav.innerHTML = items.map(item => `
                <a href="#" onclick="activePage='${item.id}'; renderView()" 
                   class="flex items-center space-x-3 px-4 py-3 rounded-lg text-sm font-medium transition-all ${activePage === item.id ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' : 'text-stone-400 hover:bg-stone-800'}">
                    <i data-lucide="${item.icon}" class="w-4 h-4"></i>
                    <span>${item.label}</span>
                </a>
            `).join('');
            lucide.createIcons();
        }

        function renderView() {
            const viewport = document.getElementById('viewport');
            renderNav();

            if (activePage === 'map') {
                viewport.innerHTML = `
                    <div class="flex flex-col h-full space-y-6">
                        <div class="flex justify-between items-center">
                            <h2 class="text-2xl font-bold">Interactive Campus View</h2>
                            <div class="flex space-x-4 text-xs font-semibold">
                                <div class="flex items-center"><span class="w-3 h-3 bg-green-500 rounded-full mr-2"></span> Quiet</div>
                                <div class="flex items-center"><span class="w-3 h-3 bg-orange-500 rounded-full mr-2"></span> Moderate</div>
                                <div class="flex items-center"><span class="w-3 h-3 bg-red-500 rounded-full mr-2"></span> Crowded</div>
                            </div>
                        </div>
                        <div class="flex-1 itu-gradient rounded-3xl relative overflow-hidden border border-stone-800 p-8">
                            <div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(#ffffff 0.5px, transparent 0.5px); background-size: 20px 20px;"></div>
                            <!-- SIMULATED NODES -->
                            ${facilities.map(f => `
                                <div onclick="showFacility(${f.id})" class="absolute cursor-pointer transition-all hover:scale-110" style="left: ${f.coords.x}%; top: ${f.coords.y}%;">
                                    <div class="flex flex-col items-center">
                                        <div class="w-8 h-8 rounded-full shadow-2xl border-2 border-white/20 flex items-center justify-center ${f.status === 'Crowded' ? 'bg-red-500 animate-pulse' : f.status === 'Moderate' ? 'bg-orange-500' : 'bg-green-500'}">
                                            <i data-lucide="${f.category === 'Eating' ? 'utensils' : 'book'}" class="w-4 h-4 text-white"></i>
                                        </div>
                                        <span class="mt-2 text-[10px] font-bold bg-black/60 px-2 py-0.5 rounded backdrop-blur-md border border-white/10 uppercase tracking-tighter">${f.name}</span>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (activePage === 'list') {
                viewport.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${facilities.map(f => `
                            <div class="glass-panel p-6 hover:border-emerald-500/50 transition-all cursor-pointer group" onclick="showFacility(${f.id})">
                                <div class="flex justify-between items-start mb-4">
                                    <div class="p-2 bg-stone-800 rounded-lg group-hover:bg-emerald-500/20 transition-all">
                                        <i data-lucide="${f.category === 'Eating' ? 'utensils' : 'book-open'}" class="w-5 h-5 text-emerald-400"></i>
                                    </div>
                                    <span class="px-2 py-1 text-[10px] font-bold rounded border uppercase ${f.status === 'Crowded' ? 'status-crowded' : f.status === 'Moderate' ? 'status-moderate' : 'status-quiet'}">${f.status}</span>
                                </div>
                                <h3 class="font-bold text-lg mb-1">${f.name}</h3>
                                <p class="text-stone-500 text-sm mb-4">${f.category} • ${f.hours}</p>
                                <div class="space-y-2">
                                    <div class="flex justify-between text-xs text-stone-400">
                                        <span>Current Occupancy</span>
                                        <span>${Math.round((f.current_count / f.capacity) * 100)}%</span>
                                    </div>
                                    <div class="w-full h-1.5 bg-stone-800 rounded-full overflow-hidden">
                                        <div class="h-full ${f.status === 'Crowded' ? 'bg-red-500' : f.status === 'Moderate' ? 'bg-orange-500' : 'bg-green-500'}" style="width: ${(f.current_count / f.capacity) * 100}%"></div>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            } else if (activePage === 'trends') {
                viewport.innerHTML = `
                    <div class="space-y-6">
                        <div class="glass-panel p-8">
                            <h2 class="text-xl font-bold mb-6">Typical Weekly Crowding: Mustafa İnan Library</h2>
                            <div class="h-[400px]">
                                <canvas id="trendsChart"></canvas>
                            </div>
                        </div>
                    </div>
                `;
                initChart();
            } else if (activePage === 'admin-dashboard') {
                viewport.innerHTML = `
                    <div class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                            <div class="glass-panel p-4">
                                <p class="text-stone-500 text-xs font-bold uppercase">Congested Areas</p>
                                <p class="text-2xl font-bold text-red-400">2</p>
                            </div>
                            <div class="glass-panel p-4">
                                <p class="text-stone-500 text-xs font-bold uppercase">Avg. Search Time</p>
                                <p class="text-2xl font-bold text-emerald-400">4.2 min</p>
                                <p class="text-[10px] text-emerald-500/70">↓ 12% from last week</p>
                            </div>
                            <div class="glass-panel p-4">
                                <p class="text-stone-500 text-xs font-bold uppercase">Feedback Reports</p>
                                <p class="text-2xl font-bold">1.2k</p>
                            </div>
                            <div class="glass-panel p-4">
                                <p class="text-stone-500 text-xs font-bold uppercase">Utilization Rate</p>
                                <p class="text-2xl font-bold">64%</p>
                            </div>
                        </div>
                        <div class="glass-panel p-8">
                            <h3 class="font-bold mb-4">Structural Utilization Trends</h3>
                             <canvas id="adminChart"></canvas>
                        </div>
                    </div>
                `;
                initAdminChart();
            }
            lucide.createIcons();
        }

        function showFacility(id) {
            const f = facilities.find(x => x.id === id);
            const modal = document.getElementById('details-modal');
            
            // Logic for Recommendation Widget
            const recommendation = f.status === 'Crowded' 
                ? facilities.find(x => x.status === 'Quiet' && x.category === f.category) || facilities.find(x => x.status === 'Quiet')
                : null;

            modal.innerHTML = `
                <div class="w-full max-w-md h-full bg-stone-900 border-l border-stone-700 shadow-2xl p-8 overflow-y-auto">
                    <button onclick="closeModal()" class="mb-6 p-2 rounded-full hover:bg-stone-800 transition-colors">
                        <i data-lucide="x" class="w-6 h-6"></i>
                    </button>
                    
                    <div class="mb-8">
                        <span class="px-2 py-1 text-[10px] font-bold rounded border uppercase ${f.status === 'Crowded' ? 'status-crowded' : f.status === 'Moderate' ? 'status-moderate' : 'status-quiet'}">${f.status}</span>
                        <h2 class="text-3xl font-bold mt-4">${f.name}</h2>
                        <p class="text-stone-400 flex items-center mt-2"><i data-lucide="clock" class="w-4 h-4 mr-2"></i> Open Today: ${f.hours}</p>
                    </div>

                    <div class="glass-panel p-6 mb-6">
                        <p class="text-stone-500 text-xs font-bold uppercase mb-4 tracking-wider text-center">Live Density Validation</p>
                        <div class="flex justify-between items-center space-x-2">
                            <button class="flex-1 py-2 text-[10px] border border-stone-700 rounded hover:bg-stone-800 transition-all">Less Busy</button>
                            <button class="flex-1 py-2 text-[10px] border border-emerald-500/50 bg-emerald-500/10 text-emerald-400 rounded">Accurate</button>
                            <button class="flex-1 py-2 text-[10px] border border-stone-700 rounded hover:bg-stone-800 transition-all">More Busy</button>
                        </div>
                    </div>

                    ${recommendation ? `
                        <div class="p-6 bg-emerald-500/10 border border-emerald-500/30 rounded-2xl mb-6">
                            <div class="flex items-center text-emerald-400 mb-3">
                                <i data-lucide="sparkles" class="w-4 h-4 mr-2"></i>
                                <p class="text-xs font-bold uppercase">Smart Recommendation</p>
                            </div>
                            <p class="text-sm text-stone-300 mb-4">The ${f.name} is currently crowded. Try this quieter alternative nearby:</p>
                            <div class="bg-stone-900/50 p-4 rounded-xl flex justify-between items-center cursor-pointer hover:bg-stone-900 transition-all border border-emerald-500/10">
                                <div>
                                    <p class="font-bold text-sm">${recommendation.name}</p>
                                    <p class="text-[10px] text-stone-500 uppercase tracking-widest">${recommendation.status} Status</p>
                                </div>
                                <i data-lucide="arrow-right" class="w-4 h-4 text-emerald-500"></i>
                            </div>
                        </div>
                    ` : ''}

                    <div class="space-y-4">
                         <h4 class="font-bold text-sm text-stone-500 uppercase">Usage Forecast</h4>
                         <div class="h-40 flex items-end space-x-2 pb-2 border-b border-stone-800">
                            ${[40, 50, 80, 100, 90, 70, 30].map((val, i) => `
                                <div class="flex-1 ${val === 100 ? 'bg-red-500' : 'bg-stone-700'} rounded-t-sm" style="height: ${val}%"></div>
                            `).join('')}
                         </div>
                         <div class="flex justify-between text-[10px] text-stone-600">
                            <span>08:00</span><span>12:00</span><span>16:00</span><span>20:00</span><span>00:00</span>
                         </div>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden');
            lucide.createIcons();
        }

        function closeModal() {
            document.getElementById('details-modal').classList.add('hidden');
        }

        function initChart() {
            const ctx = document.getElementById('trendsChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                    datasets: [{
                        label: 'Average Busy Score',
                        data: [65, 78, 90, 85, 45, 30, 40],
                        borderColor: '#10b981',
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(16, 185, 129, 0.1)'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#78716c' } } } }
            });
        }

        function initAdminChart() {
            const ctx = document.getElementById('adminChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Library', 'Dining Hall', 'Management', 'Vadi', 'SDKM'],
                    datasets: [{
                        label: 'Capacity Utilization %',
                        data: [92, 38, 18, 12, 44],
                        backgroundColor: ['#ef4444', '#f97316', '#10b981', '#10b981', '#f97316']
                    }]
                },
                options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#292524' }, ticks: { color: '#78716c' } }, x: { grid: { display: false }, ticks: { color: '#78716c' } } } }
            });
        }

        // Initialize
        setRole('student');
    </script>
</body>
</html>
